# =====================================================================================
# CHáº Y TOÃ€N Bá»˜ há»‡ thá»‘ng trong Docker (háº¡ táº§ng + config-server + 6 service).
#
# BÆ°á»›c 1 (Báº®T BUá»˜C): build jar trÆ°á»›c
#     mvn -f pom.xml clean package -DskipTests
# BÆ°á»›c 2:
#     docker compose -f docker-compose.yml up --build
#
# THá»¨ Tá»° KHá»žI Äá»˜NG Báº®T BUá»˜C:
#     postgres/kafka/redis -> config-server -> eureka-server -> cÃ¡c service
#     Má»i service Ä‘á»u cÃ³ `spring.config.import: configserver:...` KHÃ”NG optional,
#     nÃªn config-server cháº¿t lÃ  service khÃ´ng khá»Ÿi Ä‘á»™ng Ä‘Æ°á»£c.
#
# LÆ¯U Ã config-server Ä‘á»c tá»« GIT (GitHub), KHÃ”NG Ä‘á»c thÆ° má»¥c local.
#     Sá»­a config-repository á»Ÿ mÃ¡y pháº£i commit + push branch dev má»›i cÃ³ hiá»‡u lá»±c.
# =====================================================================================
services:

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ Háº  Táº¦NG â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: postgres:16
    container_name: kinderland-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - kinderland-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kinderland-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    # Pin version (khÃ´ng dÃ¹ng 'latest') Ä‘á»ƒ mÃ´i trÆ°á»ng tÃ¡i láº­p Ä‘Æ°á»£c.
    image: apache/kafka:3.9.0
    container_name: kinderland-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # EXTERNAL cho client trÃªn HOST (localhost:9092); INTERNAL cho container (kafka:29092).
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "9092:9092"
    volumes:
      - kinderland-kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ CONFIG SERVER (pháº£i cháº¡y TRÆ¯á»šC) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  config-server:
    # Context = Maven reactor root (xem giải thích ở eureka-server).
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: kinderland-config-server
    ports:
      - "8888:8888"
    environment:
      # Git backend: clone tháº³ng tá»« GitHub. Repo public nÃªn KHÃ”NG cáº§n token.
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/hai-kernel/kinderland.git}
      # config-repository lÃ  THÆ¯ Má»¤C CON trong monorepo -> báº¯t buá»™c cÃ³ search-paths,
      # thiáº¿u nÃ³ Config Server tÃ¬m á»Ÿ root repo vÃ  tráº£ 0 property source.
      CONFIG_GIT_SEARCH_PATHS: ${CONFIG_GIT_SEARCH_PATHS:-kinderland-microservices/config-repository}
      # config-repository CHá»ˆ tá»“n táº¡i trÃªn branch dev, branch main khÃ´ng cÃ³.
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH:-dev}
      CONFIG_GIT_USERNAME: ${CONFIG_GIT_USERNAME:-}
      CONFIG_GIT_TOKEN: ${CONFIG_GIT_TOKEN:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ DISCOVERY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  eureka-server:
    # Context PHẢI là Maven reactor root (thư mục chứa file compose này), KHÔNG phải
    # ./eureka-server: Dockerfile đã chuyển sang multi-stage và cần parent pom cùng
    # toàn bộ 9 module pom.xml (root pom khai báo 9 module nên Maven parse cả reactor).
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: kinderland-eureka
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ GATEWAY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  api-gateway:
    build: ./api-gateway
    container_name: kinderland-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      redis:
        condition: service_healthy

  # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ SERVICES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  auth-service:
    build: ./auth-service
    container_name: kinderland-auth
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      # KAFKA_BROKERS = business messaging (Spring Cloud Stream)
      # KAFKA_BOOTSTRAP_SERVERS = Spring Cloud Bus. Cáº§n Cáº¢ HAI.
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      JWT_EXPIRATION: "3600000"
      JWT_REFRESH_EXPIRATION: "604800000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID la bat buoc}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  product-service:
    build: ./product-service
    container_name: kinderland-product
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # AwsProperties @Validated @NotBlank -> THIáº¾U AWS_S3_BUCKET lÃ  service KHÃ”NG khá»Ÿi Ä‘á»™ng.
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET la bat buoc (product-service fail-fast)}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: kinderland-order
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  # PORT 8085 (Ä‘Ã£ Ä‘á»•i tá»« 8084) â€” khá»›p config-repository/notification-service.yml
  notification-service:
    build: ./notification-service
    container_name: kinderland-notification
    ports:
      - "8085:8085"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  # PORT 8084 â€” khá»›p `server.port` trong config-repository/payment-service.yml.
  # Cáº¢NH BÃO: port nÃ y Ä‘Ã£ Ä‘á»•i 2 láº§n (8085 -> 8086 -> 8084). Comment á»Ÿ Ä‘áº§u file YAML Ä‘Ã³
  # váº«n ghi 8086 vÃ  Ä‘ang SAI. Äá»•i port thÃ¬ pháº£i sá»­a cáº£ 3 nÆ¡i: config-repository,
  # docker-compose.yml vÃ  comment mÃ´ táº£.
  payment-service:
    build: ./payment-service
    container_name: kinderland-payment
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # VnPayProperties @Validated @NotBlank -> THIáº¾U 2 biáº¿n nÃ y lÃ  service KHÃ”NG khá»Ÿi Ä‘á»™ng.
      # ÄÃ¢y lÃ  CHá»¦ Ã: trÆ°á»›c Ä‘Ã¢y secret rá»—ng thÃ¬ há»‡ thá»‘ng tá»± Ä‘Ã¡nh SUCCESS má»i giao dá»‹ch.
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:?VNPAY_TMN_CODE la bat buoc (payment-service fail-fast)}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY:?VNPAY_SECRET_KEY la bat buoc (payment-service fail-fast)}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/v1/payment/vnpay-return}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  kinderland-pgdata:
  kinderland-kafkadata:
