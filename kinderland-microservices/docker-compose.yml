# =====================================================================================
# CHaº Y TOA€N Ba»˜ ha»‡ tha»‘ng trong Docker (haº¡ taº§ng + config-server + 6 service).
#
# BÆ°a»›c 1 (Baº®T BUa»˜C): build jar trÆ°a»›c
#     mvn -f pom.xml clean package -DskipTests
# BÆ°a»›c 2:
#     docker compose -f docker-compose.yml up --build
#
# THa»¨ Ta»° KHa»zI Aa»˜NG Baº®T BUa»˜C:
#     postgres/kafka/redis -> config-server -> eureka-server -> cA¡c service
#     Ma»i service A‘a»u cA³ `spring.config.import: configserver:...` KHA”NG optional,
#     nAªn config-server chaº¿t lA  service khA´ng kha»Yi A‘a»™ng A‘Æ°a»£c.
#
# LÆ¯U A config-server A‘a»c ta»« GIT (GitHub), KHA”NG A‘a»c thÆ° ma»¥c local.
#     Sa»a config-repository a»Y mA¡y phaº£i commit + push branch dev ma»›i cA³ hia»‡u la»±c.
# =====================================================================================
services:

  # a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€ Haº  Taº¦NG a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€
  postgres:
    image: postgres:16
    container_name: kinderland-postgres
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - kinderland-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kinderland-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    # Pin version (khA´ng dA¹ng 'latest') A‘a»ƒ mA´i trÆ°a»ng tA¡i laºp A‘Æ°a»£c.
    image: apache/kafka:3.9.0
    container_name: kinderland-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # EXTERNAL cho client trAªn HOST (localhost:9092); INTERNAL cho container (kafka:29092).
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "9092:9092"
    volumes:
      - kinderland-kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€ CONFIG SERVER (phaº£i chaº¡y TRÆ¯a»sC) a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€
  config-server:
    # Context = Maven reactor root (xem giai thich o eureka-server).
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: kinderland-config-server
    ports:
      - "8888:8888"
    environment:
      # Git backend: clone thaº³ng ta»« GitHub. Repo public nAªn KHA”NG caº§n token.
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/hai-kernel/kinderland.git}
      # config-repository lA  THÆ¯ Ma»¤C CON trong monorepo -> baº¯t bua»™c cA³ search-paths,
      # thiaº¿u nA³ Config Server tA¬m a»Y root repo vA  traº£ 0 property source.
      CONFIG_GIT_SEARCH_PATHS: ${CONFIG_GIT_SEARCH_PATHS:-kinderland-microservices/config-repository}
      # Branch chua config-repository. THONG NHAT 'main' cho ca local lan docker:
      # config-server/application.yml cung default 'main' -> sua config o mot noi la ca hai
      # moi truong deu nhan. Doi branch thi phai doi CA HAI cho.
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH:-main}
      CONFIG_GIT_USERNAME: ${CONFIG_GIT_USERNAME:-}
      CONFIG_GIT_TOKEN: ${CONFIG_GIT_TOKEN:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€ DISCOVERY a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€
  eureka-server:
    # Context PHAI la Maven reactor root (thu muc chua file compose nay), KHONG phai
    # ./eureka-server: Dockerfile da chuyen sang multi-stage va can parent pom cung
    # toan bo 9 module pom.xml (root pom khai bao 9 module nen Maven parse ca reactor).
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: kinderland-eureka
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  # a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€ GATEWAY a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€
  api-gateway:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: kinderland-gateway
    ports:
      - "8080:8080"
    environment:
      # api-gateway khong co seeder, dat dev cho dong bo profile toan he thong
      # (Config Server se tra api-gateway/dev thay vi api-gateway/default).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€ SERVICES a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€a”€
  auth-service:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: kinderland-auth
    ports:
      - "8081:8081"
    environment:
      # Profile dev -> Config Server tra ve application-dev.yml (app.seed.*).
      # Thieu bien nay: DataSeedCoordinator bi @Profile("dev") chan -> KHONG seed.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      # KAFKA_BROKERS = business messaging (Spring Cloud Stream)
      # KAFKA_BOOTSTRAP_SERVERS = Spring Cloud Bus. Caº§n Caº¢ HAI.
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      JWT_EXPIRATION: "3600000"
      JWT_REFRESH_EXPIRATION: "604800000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID la bat buoc}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  product-service:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: kinderland-product
    ports:
      - "8082:8082"
    environment:
      # Profile dev -> Config Server tra ve application-dev.yml (app.seed.*).
      # Thieu bien nay: DataSeedCoordinator bi @Profile("dev") chan -> KHONG seed.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # AwsProperties @Validated @NotBlank -> THIaº¾U AWS_S3_BUCKET lA  service KHA”NG kha»Yi A‘a»™ng.
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET la bat buoc (product-service fail-fast)}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  order-service:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: kinderland-order
    ports:
      - "8083:8083"
    environment:
      # Profile dev -> Config Server tra ve application-dev.yml (app.seed.*).
      # Thieu bien nay: DataSeedCoordinator bi @Profile("dev") chan -> KHONG seed.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # PORT 8085 (A‘A£ A‘a»•i ta»« 8084) a€” kha»›p config-repository/notification-service.yml
  notification-service:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: kinderland-notification
    ports:
      - "8085:8085"
    environment:
      # notification-service khong co seeder, dat dev cho dong bo profile toan he thong.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # PORT 8084 a€” kha»›p `server.port` trong config-repository/payment-service.yml.
  # Caº¢NH BAO: port nA y A‘A£ A‘a»•i 2 laº§n (8085 -> 8086 -> 8084). Comment a»Y A‘aº§u file YAML A‘A³
  # vaº«n ghi 8086 vA  A‘ang SAI. Aa»•i port thA¬ phaº£i sa»a caº£ 3 nÆ¡i: config-repository,
  # docker-compose.yml vA  comment mA´ taº£.
  payment-service:
    # Context = Maven reactor root (Dockerfile multi-stage, xem config-server).
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: kinderland-payment
    ports:
      - "8084:8084"
    environment:
      # Profile dev -> Config Server tra ve application-dev.yml (app.seed.*).
      # Thieu bien nay: DataSeedCoordinator bi @Profile("dev") chan -> KHONG seed.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      CONFIG_SERVER_URL: http://config-server:8888
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: "123456"
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # VnPayProperties @Validated @NotBlank -> THIaº¾U 2 biaº¿n nA y lA  service KHA”NG kha»Yi A‘a»™ng.
      # AA¢y lA  CHa»¦ A: trÆ°a»›c A‘A¢y secret ra»—ng thA¬ ha»‡ tha»‘ng ta»± A‘A¡nh SUCCESS ma»i giao da»‹ch.
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:?VNPAY_TMN_CODE la bat buoc (payment-service fail-fast)}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY:?VNPAY_SECRET_KEY la bat buoc (payment-service fail-fast)}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      # MAC DINH la PRODUCTION: quen set bien tren EC2 thi VNPay van redirect dung,
      # thay vi day khach ve localhost. Chay local thi dat 2 bien nay trong .env.
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-https://api.kinderland.io.vn/api/v1/payment/vnpay-return}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.kinderland.io.vn}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  kinderland-pgdata:
  kinderland-kafkadata:
