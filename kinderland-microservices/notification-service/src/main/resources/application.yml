# Cấu hình chi tiết được lấy từ Config Server (config-repository/notification-service.yml
# + application.yml). File local chỉ giữ tên service + nguồn cấu hình.
spring:
  application:
    name: notification-service   # PHẢI khớp tên file trong config-repository
  config:
    import:
      # .env: nạp secret (MAIL_PASS...) - KHÔNG commit
      - optional:file:.env[.properties]
      # Config Server: nạp cấu hình tập trung
      - optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
