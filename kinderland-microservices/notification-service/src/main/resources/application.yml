# Cấu hình chi tiết lấy từ Config Server (Git backend). File local chỉ giữ cấu hình khởi động sớm.
spring:
  application:
    name: notification-service   # PHẢI khớp notification-service.yml trong config repo

  config:
    import:
      - optional:file:.env[.properties]
      - configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    # Giữ ở LOCAL: BusEnvironmentPostProcessor append 'busConsumer' vào property này
    # từ rất sớm, trước khi property source của Config Server sẵn sàng.
    function:
      definition: userRegistered
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh
