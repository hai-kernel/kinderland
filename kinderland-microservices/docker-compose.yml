# =====================================================================================
# CHẠY TOÀN BỘ hệ thống trong Docker (hạ tầng + config-server + 6 service).
#
# Bước 1 (BẮT BUỘC): build jar trước
#     mvn -f pom.xml clean package -DskipTests
# Bước 2:
#     docker compose -f docker-compose.yml up --build
#
# THỨ TỰ KHỞI ĐỘNG BẮT BUỘC:
#     postgres/kafka/redis -> config-server -> eureka-server -> các service
#     Mọi service đều có `spring.config.import: configserver:...` KHÔNG optional,
#     nên config-server chết là service không khởi động được.
#
# LƯU Ý config-server đọc từ GIT (GitHub), KHÔNG đọc thư mục local.
#     Sửa config-repository ở máy phải commit + push branch dev mới có hiệu lực.
# =====================================================================================
services:

  # ─────────────────────────── HẠ TẦNG ───────────────────────────
  postgres:
    image: postgres:16
    container_name: kinderland-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - kinderland-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kinderland-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    # Pin version (không dùng 'latest') để môi trường tái lập được.
    image: apache/kafka:3.9.0
    container_name: kinderland-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # EXTERNAL cho client trên HOST (localhost:9092); INTERNAL cho container (kafka:29092).
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    ports:
      - "9092:9092"
    volumes:
      - kinderland-kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # ─────────────────── CONFIG SERVER (phải chạy TRƯỚC) ───────────────────
  config-server:
    build: ./config-server
    container_name: kinderland-config-server
    ports:
      - "8888:8888"
    environment:
      # Git backend: clone thẳng từ GitHub. Repo public nên KHÔNG cần token.
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/hai-kernel/kinderland.git}
      # config-repository là THƯ MỤC CON trong monorepo -> bắt buộc có search-paths,
      # thiếu nó Config Server tìm ở root repo và trả 0 property source.
      CONFIG_GIT_SEARCH_PATHS: ${CONFIG_GIT_SEARCH_PATHS:-kinderland-microservices/config-repository}
      # config-repository CHỈ tồn tại trên branch dev, branch main không có.
      CONFIG_GIT_BRANCH: ${CONFIG_GIT_BRANCH:-dev}
      CONFIG_GIT_USERNAME: ${CONFIG_GIT_USERNAME:-}
      CONFIG_GIT_TOKEN: ${CONFIG_GIT_TOKEN:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─────────────────────────── DISCOVERY ───────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: kinderland-eureka
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy

  # ─────────────────────────── GATEWAY ───────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: kinderland-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      redis:
        condition: service_healthy

  # ─────────────────────────── SERVICES ───────────────────────────
  auth-service:
    build: ./auth-service
    container_name: kinderland-auth
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kinderland_auth_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      EUREKA_URL: http://eureka-server:8761/eureka/
      # KAFKA_BROKERS = business messaging (Spring Cloud Stream)
      # KAFKA_BOOTSTRAP_SERVERS = Spring Cloud Bus. Cần CẢ HAI.
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET la bat buoc}
      JWT_EXPIRATION: "3600000"
      JWT_REFRESH_EXPIRATION: "604800000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID la bat buoc}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
      REDIS_HOST: redis
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  product-service:
    build: ./product-service
    container_name: kinderland-product
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kinderland_product_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # AwsProperties @Validated @NotBlank -> THIẾU AWS_S3_BUCKET là service KHÔNG khởi động.
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET la bat buoc (product-service fail-fast)}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: kinderland-order
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kinderland_order_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  # PORT 8085 (đã đổi từ 8084) — khớp config-repository/notification-service.yml
  notification-service:
    build: ./notification-service
    container_name: kinderland-notification
    ports:
      - "8085:8085"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASS: ${MAIL_PASS:-}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

  # PORT 8084 — khớp `server.port` trong config-repository/payment-service.yml.
  # CẢNH BÁO: port này đã đổi 2 lần (8085 -> 8086 -> 8084). Comment ở đầu file YAML đó
  # vẫn ghi 8086 và đang SAI. Đổi port thì phải sửa cả 3 nơi: config-repository,
  # docker-compose.yml và comment mô tả.
  payment-service:
    build: ./payment-service
    container_name: kinderland-payment
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kinderland_payment_db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      EUREKA_URL: http://eureka-server:8761/eureka/
      KAFKA_BROKERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # VnPayProperties @Validated @NotBlank -> THIẾU 2 biến này là service KHÔNG khởi động.
      # Đây là CHỦ Ý: trước đây secret rỗng thì hệ thống tự đánh SUCCESS mọi giao dịch.
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:?VNPAY_TMN_CODE la bat buoc (payment-service fail-fast)}
      VNPAY_SECRET_KEY: ${VNPAY_SECRET_KEY:?VNPAY_SECRET_KEY la bat buoc (payment-service fail-fast)}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/v1/payment/vnpay-return}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  kinderland-pgdata:
  kinderland-kafkadata:
