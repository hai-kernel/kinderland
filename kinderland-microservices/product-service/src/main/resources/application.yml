# Cấu hình chi tiết được lấy từ Config Server (config-repository/product-service.yml
# + application.yml). File local chỉ giữ tên service + nguồn cấu hình.
spring:
  application:
    name: product-service   # PHẢI khớp tên file trong config-repository và route lb://PRODUCT-SERVICE ở Gateway
  config:
    import:
      # .env: nạp secret (DB_PASSWORD, AWS_ACCESS_KEY...) - KHÔNG commit
      - optional:file:.env[.properties]
      # Config Server: nạp cấu hình tập trung
      - optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
