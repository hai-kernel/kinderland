# Cấu hình chi tiết được lấy từ Config Server (config-repository/auth-service.yml
# + application.yml). File local chỉ giữ tên service + nguồn cấu hình.
spring:
  application:
    name: auth-service   # PHẢI khớp tên file trong config-repository và route lb://AUTH-SERVICE ở Gateway
  config:
    import:
      # .env: nạp secret (JWT_SECRET, DB_PASSWORD, MAIL_PASS...) - KHÔNG commit
      - optional:file:.env[.properties]
      # Config Server: nạp cấu hình tập trung
      - optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
