# Cấu hình chi tiết lấy từ Config Server (Git backend). File local chỉ giữ:
#   - tên service (để Config Server biết trả file nào)
#   - nguồn cấu hình (.env cho secret + config server)
#   - toạ độ Kafka cho Spring Cloud Bus (phải có TRƯỚC khi Bus khởi tạo)
spring:
  application:
    name: auth-service   # PHẢI khớp auth-service.yml trong config repo

  config:
    import:
      # .env: secret (JWT_SECRET, DB_PASSWORD, MAIL_PASS...) - KHÔNG commit
      - optional:file:.env[.properties]
      # KHÔNG dùng optional: -> fail ngay nếu Config Server không truy cập được
      - configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  # Bus qua Kafka. Để ở local vì Bus khởi tạo rất sớm trong vòng đời context.
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh
