# Cấu hình chi tiết được lấy từ Config Server (config-repository/eureka-server.yml).
# File local chỉ giữ tên service + nguồn cấu hình.
spring:
  application:
    name: eureka-server
  config:
    # Config Server: nạp cấu hình tập trung (port, eureka server settings)
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
