# Cấu hình chi tiết lấy từ Config Server (Git backend). File local chỉ giữ cấu hình khởi động sớm.
spring:
  application:
    name: api-gateway   # PHẢI khớp api-gateway.yml trong config repo

  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh
