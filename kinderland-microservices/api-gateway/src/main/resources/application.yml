# Cấu hình chi tiết được lấy từ Config Server (config-repository/api-gateway.yml
# + application.yml). File local chỉ giữ tên service + nguồn cấu hình.
spring:
  application:
    name: api-gateway
  config:
    # Config Server: nạp cấu hình tập trung (routes, redis, jwt secret placeholder...)
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
