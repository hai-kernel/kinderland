server:
  port: 8082

spring:
  application:
    name: product-service   # khớp route lb://PRODUCT-SERVICE ở Gateway
  config:
    import: optional:file:.env[.properties]

  # ----- Cho phép upload ảnh tới 10MB -----
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ----- Database RIÊNG của product-service -----
  datasource:
    url: jdbc:postgresql://localhost:5432/kinderland_product_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ----- Kafka consumer: trừ kho (order-created) + hoàn kho (order-cancelled) -----
  cloud:
    function:
      definition: orderCreated;orderCancelled;returnReceived   # 3 bean Consumer
    stream:
      bindings:
        orderCreated-in-0:
          destination: order-events               # topic do order-service publish khi tạo đơn
          group: product-service
        orderCancelled-in-0:
          destination: order-cancelled-events     # topic do order-service publish khi huỷ đơn
          group: product-service
        returnReceived-in-0:
          destination: return-received-events     # topic do order-service publish khi nhận hàng trả
          group: product-service
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ----- AWS S3 (lưu ảnh sản phẩm). Điền creds vào .env, KHÔNG commit. -----
aws:
  access-key: ${AWS_ACCESS_KEY:}
  secret-key: ${AWS_SECRET_KEY:}
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket: ${AWS_S3_BUCKET:}
