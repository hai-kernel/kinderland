# =====================================================================================
# Deploy lên EC2 qua SSH — CHỈ config-server + eureka-server (lần deploy đầu).
#
# QUAN TRỌNG: file này PHẢI tồn tại trên DEFAULT BRANCH (main) thì GitHub mới đăng ký
# trigger `workflow_run` và nút Run workflow của `workflow_dispatch`. Hiện main chưa có
# thư mục .github/ -> xem hướng dẫn cuối file.
# =====================================================================================
name: Deploy EC2

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - production

permissions:
  contents: read

# Không huỷ deploy đang chạy giữa chừng — dễ để lại container ở trạng thái dở dang.
concurrency:
  group: deploy-ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Config Server + Eureka to EC2
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 40m

          script: |
            set -Eeuo pipefail

            DEPLOY_ROOT="$HOME/kinderland"
            MAVEN_ROOT="$DEPLOY_ROOT/kinderland-microservices"
            COMPOSE_FILE="$MAVEN_ROOT/docker-compose.yml"
            ENV_FILE="$MAVEN_ROOT/.env"

            dc() {
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" "$@"
            }

            print_diagnostics() {
              echo "======== DIAGNOSTICS ========"
              if [ -d "$MAVEN_ROOT" ] && command -v docker >/dev/null 2>&1; then
                cd "$MAVEN_ROOT" || true
                dc ps || true
                echo "---- config-server logs ----"
                dc logs --tail=200 config-server || true
                echo "---- eureka-server logs ----"
                dc logs --tail=200 eureka-server || true
              fi
            }

            trap 'echo "Deployment failed at line $LINENO"; print_diagnostics' ERR

            echo "======== DEPLOY START ========"
            echo "Host: $(hostname)  User: $(whoami)  Time: $(date -Iseconds)"

            # ---------- Tiền kiểm tra ----------
            command -v git >/dev/null 2>&1 || { echo "ERROR: git is not installed."; exit 1; }
            command -v docker >/dev/null 2>&1 || { echo "ERROR: docker is not installed."; exit 1; }
            docker info >/dev/null 2>&1 || { echo "ERROR: Docker daemon unavailable or user lacks permission."; exit 1; }
            docker compose version >/dev/null 2>&1 || { echo "ERROR: Docker Compose plugin unavailable."; exit 1; }

            [ -d "$DEPLOY_ROOT/.git" ] || { echo "ERROR: repo not initialized at $DEPLOY_ROOT. Clone it manually first."; exit 1; }
            [ -d "$MAVEN_ROOT" ]       || { echo "ERROR: Maven root missing: $MAVEN_ROOT"; exit 1; }
            [ -f "$COMPOSE_FILE" ]     || { echo "ERROR: compose file missing: $COMPOSE_FILE"; exit 1; }
            [ -f "$ENV_FILE" ]         || { echo "ERROR: production .env missing: $ENV_FILE"; exit 1; }

            # ---------- Đồng bộ source ----------
            echo "======== SYNC production ========"
            cd "$DEPLOY_ROOT"
            git fetch origin production
            git checkout production
            git reset --hard origin/production
            echo "Deploying commit: $(git log -1 --oneline)"

            cd "$MAVEN_ROOT"

            echo "======== VALIDATE COMPOSE ========"
            dc config --quiet

            # ---------- Config Server TRƯỚC ----------
            # Eureka có `spring.config.import: configserver:...` KHÔNG optional -> nó
            # không khởi động được nếu Config Server chưa sẵn sàng. depends_on chỉ đảm bảo
            # THỨ TỰ khởi động, không đảm bảo đã healthy -> phải tự chờ health bên dưới.
            echo "======== START config-server ========"
            dc up -d --build config-server

            echo "Waiting for config-server health (max 180s)..."
            CONFIG_OK=false
            for attempt in $(seq 1 18); do
              # Port 8888 CÓ publish ra host (compose: "8888:8888") nên gọi trực tiếp được.
              if curl --fail --silent --show-error http://localhost:8888/actuator/health >/dev/null 2>&1; then
                CONFIG_OK=true
                echo "config-server healthy after ${attempt} attempt(s)."
                break
              fi
              echo "config-server health attempt ${attempt}/18 failed."
              sleep 10
            done

            if [ "$CONFIG_OK" != "true" ]; then
              echo "ERROR: config-server did not become healthy."
              dc ps
              dc logs --tail=200 config-server
              exit 1
            fi

            # ---------- Eureka SAU ----------
            echo "======== START eureka-server ========"
            dc up -d --build eureka-server

            echo "Waiting for eureka-server health (max 180s)..."
            EUREKA_OK=false
            for attempt in $(seq 1 18); do
              if curl --fail --silent --show-error http://localhost:8761/actuator/health >/dev/null 2>&1; then
                EUREKA_OK=true
                echo "eureka-server healthy after ${attempt} attempt(s)."
                break
              fi
              echo "eureka-server health attempt ${attempt}/18 failed."
              sleep 10
            done

            if [ "$EUREKA_OK" != "true" ]; then
              echo "ERROR: eureka-server did not become healthy."
              dc ps
              dc logs --tail=200 eureka-server
              dc logs --tail=100 config-server
              exit 1
            fi

            # ---------- Kết quả ----------
            echo "======== STATUS ========"
            dc ps config-server eureka-server
            echo "---- config-server logs ----"
            dc logs --tail=100 config-server
            echo "---- eureka-server logs ----"
            dc logs --tail=100 eureka-server

            # Chỉ xoá image dangling. KHÔNG dùng `docker system prune -a`,
            # `docker volume prune`, `docker compose down` hay `--remove-orphans`.
            echo "======== CLEANUP dangling images ========"
            docker image prune -f

            trap - ERR
            echo "======== DEPLOY SUCCESS ========"
