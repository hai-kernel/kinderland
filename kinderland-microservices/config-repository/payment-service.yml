# ----- payment-service: thanh toán (VNPay + COD). Port 8086, DB kinderland_payment_db. -----
server:
  port: 8084

spring:
  # ----- Database RIÊNG của payment-service -----
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/kinderland_payment_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ----- Kafka producer: bắn PaymentCompletedEvent -> order-service set PAID (Saga async) -----
  cloud:
    stream:
      bindings:
        paymentCompleted-out-0:
          destination: payment-events
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}

# ----- VNPay (sandbox). Điền giá trị thật vào .env, KHÔNG commit. -----
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  secret-key: ${VNPAY_SECRET_KEY:}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  # MAC DINH la PRODUCTION. Truoc day de localhost:8080 -> quen set bien moi truong
  # tren EC2 la VNPay redirect khach ve localhost, khach thay trang trang.
  # Chay local thi dat VNPAY_RETURN_URL trong .env de ghi de.
  return-url: ${VNPAY_RETURN_URL:https://api.kinderland.io.vn/api/v1/payment/vnpay-return}
  frontend-url: ${FRONTEND_URL:https://www.kinderland.io.vn}
  # Cho phep XAC NHAN THANH TOAN tu return-url/verify thay vi cho IPN.
  #
  # MAC DINH false = chi IPN (server-to-server) duoc ghi DB — an toan nhat.
  # Bat true khi cong merchant KHONG khai bao duoc IPN URL (hay gap o sandbox):
  # khong co IPN thi payment nam PENDING vinh vien, don bi huy, doanh thu = 0.
  #
  # Bat len VAN kiem chu ky HMAC-SHA512 + doi chieu so tien, khong tin suong
  # tham so tu trinh duyet. Diem yeu duy nhat: phu thuoc khach co quay ve hay
  # khong — khach tat tab sau khi tra tien thi don van treo PENDING.
  trust-return-url: ${VNPAY_TRUST_RETURN_URL:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
