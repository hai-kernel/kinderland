server:
  port: 8084

spring:
  application:
    name: notification-service
  config:
    import: optional:file:.env[.properties]

  # ----- Email -----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ----- Kafka consumer (Spring Cloud Stream functional) -----
  cloud:
    function:
      definition: userRegistered        # tên bean Consumer
    stream:
      bindings:
        userRegistered-in-0:
          destination: notification-events   # = Kafka topic
          group: notification-service        # consumer group (đảm bảo mỗi event xử lý 1 lần/cụm)
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
