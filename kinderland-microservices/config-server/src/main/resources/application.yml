server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    name: config-server

  # native = đọc cấu hình từ hệ thống file (KHÔNG dùng Git backend)
  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          search-locations:
            - file:///C:/Users/ACER/Documents/GitHub/kinderland/kinderland-microservices/config-repository/
            - file:///C:/Users/ACER/Documents/GitHub/kinderland/kinderland-microservices/config-repository
            - file:./config-repository/
            - file:../config-repository/

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      show-details: always
