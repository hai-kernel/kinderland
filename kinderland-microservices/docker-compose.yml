# Hạ tầng dev cho Kinderland Microservices: PostgreSQL (3 DB) + Kafka (KRaft, 1 node).
# Dùng: docker compose up -d
# Các service Spring Boot chạy trên HOST (mvn spring-boot:run) nên Kafka advertise localhost:9092.
services:
  postgres:
    image: postgres:16
    container_name: kinderland-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - kinderland-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: kinderland-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # 2 listener: EXTERNAL cho client chạy trên HOST (localhost:9092),
      #             INTERNAL cho client chạy trong container khác (kafka:29092).
      - KAFKA_CFG_LISTENERS=EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kinderland-kafkadata:/bitnami/kafka

volumes:
  kinderland-pgdata:
  kinderland-kafkadata:
